name: Update Job Migration Dashboard

on:
  # Run automatically every day at 2:00 AM IST (8:30 PM UTC)
  schedule:
    - cron: '30 20 * * *'

  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 now

permissions:
  contents: write   # needed to commit updated data back to repo

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repo ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install dependencies (reads requirements.txt) ─────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # ── 4. Run the data pipeline ──────────────────────────────────────────
      #    Secrets are injected as environment variables — never visible in logs
      - name: Run pipeline
        env:
          ADZUNA_APP_ID:  ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          python pipeline.py

      # ── 5. Inject fresh data into the dashboard HTML ──────────────────────
      - name: Inject data into dashboard
        run: |
          python inject_data.py

      # ── 6. Commit & push updated files back to main ───────────────────────
      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html migration_flows.json last_updated.txt
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: auto-update dashboard data $(date +'%Y-%m-%d')"
          git push
